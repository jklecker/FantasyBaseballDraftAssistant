spring.application.name=FantasyBaseballDraftAssistant

# Render injects PORT; falls back to 8080 for local dev
server.port=${PORT:8080}

# Player pool ? MLB Stats API season (last completed season).
# Falls back to players.csv if the API is unreachable.
mlb.stats.season=2025
players.csv.path=players.csv

# Never cache static resources ? asset filenames are content-hashed by Vite,
# but index.html must always be fresh so the browser picks up new hashes.
spring.web.resources.cache.period=0
spring.web.resources.cache.use-last-modified=false

